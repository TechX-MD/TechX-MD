<!DOCTYPE html>
<html>
<head>
<title>TECHX-MD Pair</title>

<style>
body{
    background:#050505;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:40px;
}

.card{
    max-width:400px;
    margin:auto;
    background:#111;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px cyan;
}

input,button{
    width:90%;
    padding:15px;
    margin:10px;
    border-radius:10px;
    border:none;
    font-size:18px;
}

button{
    background:#00ffff;
    color:black;
    font-weight:bold;
}

#code{
    font-size:35px;
    color:#00ff99;
    margin-top:20px;
    letter-spacing:5px;
}
</style>

</head>

<body>

<div class="card">

<h1>🚀 TECHX-MD</h1>
<h3>WhatsApp Pairing</h3>

<input id="number" placeholder="263xxxxxxxxx">

<button onclick="pair()">Generate Code</button>

<h2 id="status"></h2>

<div id="code"></div>

</div>


<script>

async function pair(){

let number=document.getElementById("number").value;

document.getElementById("status").innerHTML="Starting...";

await fetch("/pair",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
number:number
})
});


let timer=setInterval(async()=>{

let res=await fetch("/code/"+number);

let data=await res.json();


if(data.code){

document.getElementById("code").innerHTML=data.code;

document.getElementById("status").innerHTML="✅ Your Pair Code";

clearInterval(timer);

}

},3000);


}

</script>

</body>
</html>
