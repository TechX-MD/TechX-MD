<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TECHX-MD Pairing</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#050510;

font-family:Arial,sans-serif;

color:white;

padding:20px;

}



.card{

width:100%;
max-width:430px;

background:rgba(15,15,25,.85);

border:1px solid cyan;

border-radius:30px;

padding:30px;

box-shadow:
0 0 25px cyan,
inset 0 0 20px rgba(0,255,255,.1);

}



.logo{

font-size:35px;

color:#00ffff;

text-shadow:0 0 15px cyan;

}



.subtitle{

color:#aaa;

}



.box{

margin-top:25px;

background:#090914;

border-radius:20px;

padding:20px;

border:1px solid rgba(0,255,255,.3);

}



.input{

display:flex;

align-items:center;

background:#000;

border-radius:50px;

border:1px solid cyan;

padding:10px;

}



.code{

color:#00ffff;

font-size:18px;

}



input{

width:100%;

background:none;

border:none;

outline:none;

color:white;

font-size:18px;

}



button{

width:100%;

margin-top:20px;

padding:16px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:bold;

background:#00ffff;

cursor:pointer;

box-shadow:0 0 20px cyan;

}



button:active{

transform:scale(.95);

}



#paircode{

font-size:38px;

letter-spacing:8px;

color:#00ff99;

margin-top:20px;

text-shadow:0 0 20px #00ff99;

}



.channel{

margin-top:25px;

background:#160016;

border:1px solid #ff00aa;

padding:18px;

border-radius:20px;

}



.channel a{

display:block;

margin-top:15px;

padding:12px;

border-radius:50px;

background:#ff00aa;

color:white;

text-decoration:none;

font-weight:bold;

}



</style>

</head>


<body>



<div class="card">


<div class="logo">
🚀 TECHX-MD
</div>


<p class="subtitle">
Secure WhatsApp Pairing Interface
</p>



<div class="box">


<h3>
📱 WhatsApp Pairing
</h3>



<div class="input">

<span class="code">
+263
</span>


<input 
id="number"
value="712345678"
placeholder="7xxxxxxxxx">

</div>



<button onclick="pair()">

⚡ Generate Code

</button>



<h3 id="status"></h3>


<div id="paircode"></div>


</div>





<div class="channel">


<h3>
📢 Channel Requirement
</h3>


<p>
⛓️ Join first before pairing
</p>



<a href="https://whatsapp.com/channel/0029Vb8QAZyAe5VyFTerO82q"
target="_blank">

🔗 Join Channel

</a>


</div>



</div>





<script>


async function pair(){


let input =
document.getElementById("number").value;


let number =
"263"+input.replace(/^0+/,"");



let status =
document.getElementById("status");


let code =
document.getElementById("paircode");



status.innerHTML =
"⏳ Starting secure pairing...";

code.innerHTML="";



try{


await fetch("/pair",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

number:number

})

});



let timer=setInterval(async()=>{


let res =
await fetch("/code/"+number);



let data =
await res.json();



if(data.code){


code.innerHTML=data.code;


status.innerHTML=
"✅ Pair Code Generated";


clearInterval(timer);


}



},3000);



}catch(e){


status.innerHTML=
"❌ Pairing failed";


console.log(e);


}



}



</script>



</body>

</html>
