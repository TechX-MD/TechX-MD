<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TECHX-MD Pairing</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#050510;

font-family:Arial,sans-serif;

color:white;

padding:20px;

}


.card{

width:100%;
max-width:430px;

background:#111827;

padding:30px;

border-radius:30px;

border:1px solid cyan;

box-shadow:
0 0 25px cyan,
0 0 50px rgba(0,255,255,.2);

}



.logo{

font-size:35px;
font-weight:bold;

color:#00ffff;

text-shadow:0 0 15px cyan;

}



.subtitle{

color:#aaa;

}



.box,
.channel{

margin-top:25px;

background:#080b14;

padding:20px;

border-radius:20px;

border:1px solid rgba(0,255,255,.3);

}



.channel{

background:#20001c;

border-color:#ff00aa;

}



.channel a{

display:block;

text-align:center;

background:#ff00aa;

padding:14px;

border-radius:50px;

color:white;

text-decoration:none;

font-weight:bold;

}



input{

width:100%;

padding:15px;

margin-top:10px;

background:#000;

border:1px solid cyan;

border-radius:50px;

color:white;

font-size:18px;

outline:none;

}



button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:bold;

background:#00ffff;

color:black;

cursor:pointer;

box-shadow:0 0 20px cyan;

}



button:hover{

transform:scale(1.03);

}



#status{

text-align:center;

color:#00ffff;

}



#paircode{

text-align:center;

font-size:40px;

letter-spacing:8px;

color:#00ff99;

text-shadow:0 0 20px #00ff99;

margin-top:20px;

}



</style>

</head>



<body>



<div class="card">


<div class="logo">
🚀 TECHX-MD
</div>


<p class="subtitle">
Secure WhatsApp Pairing Interface
</p>



<div class="channel">


<h3>
📢 Channel Required
</h3>


<p>
⚠️ Join WhatsApp channel first before pairing
</p>


<a href="https://whatsapp.com/channel/0029Vb8QAZyAe5VyFTerO82q"
target="_blank">

🔗 Join Channel First

</a>


<button onclick="verifyChannel()">

✅ I Have Joined

</button>


</div>





<div class="box">


<h3>
📱 Enter WhatsApp Number
</h3>



<input 
id="number"
placeholder="263xxxxxxxxx">



<button 
id="pairButton"
onclick="pair()"
style="display:none">

⚡ Generate Pair Code

</button>



<h3 id="status"></h3>


<div id="paircode"></div>



</div>



</div>




<script>


let verified=false;



function verifyChannel(){


verified=true;


document.getElementById("pairButton").style.display="block";


document.getElementById("status").innerHTML=
"✅ Channel verified";


}





async function pair(){


if(!verified){

alert("Please join channel first");

return;

}



let number =
document.getElementById("number").value.trim();



if(!number){

alert("Enter WhatsApp number");

return;

}



number = number.replace(/\D/g,"");



document.getElementById("status").innerHTML =
"⏳ Generating pair code...";



try{


await fetch("/pair",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

number:number

})

});



let timer=setInterval(async()=>{


let res =
await fetch("/code/"+number);



let data =
await res.json();



if(data.code){


document.getElementById("paircode").innerHTML =
data.code;



document.getElementById("status").innerHTML =
"✅ Pair Code Ready";


clearInterval(timer);


}



},3000);



}catch(e){


document.getElementById("status").innerHTML =
"❌ Something went wrong";


console.log(e);


}



}



</script>


</body>

</html>
